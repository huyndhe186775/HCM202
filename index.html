<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuyên ngôn Độc lập</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="video-container">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="bản tuyên ngôn độc lập.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="overlay">
            <div class="content">
                <h1 id="title">Tuyên ngôn Độc lập</h1>
                <p id="subtitle">Nước Việt Nam Dân chủ Cộng hòa</p>
                <button id="unmute-btn" class="glass-btn">
                    <span id="icon">🔇</span> Bật âm thanh
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
