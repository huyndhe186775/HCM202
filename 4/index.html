<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành trình lãnh tụ</title>
    <link rel="stylesheet" href="/4/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="video-container">
        <video id="bg-video" autoplay loop playsinline>
            <source src="/4/video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="overlay">
            <div class="content">
                <h1 id="title">Bác Hồ ra đi tìm đường cứu nước</h1>
                <p id="subtitle">Hành trình lãnh tụ</p>
                <div class="launch-screen">
                    <button id="start-btn" class="glass-btn pulse">
                        NHẤN ĐỂ XEM CLIP
                    </button>
                    <p class="hint">Yêu cầu tương tác để bật âm thanh</p>
                </div>
            </div>
        </div>
    </div>
    <script src="/4/script.js"></script>
</body>

</html>
